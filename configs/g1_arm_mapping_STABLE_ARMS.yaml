model:
  # Clone or copy Unitree's MuJoCo assets into this path, or override with
  # --model-xml. See README.md for setup instructions.
  xml_path: "assets/unitree_mujoco/unitree_robots/g1/scene.xml"

camera:
  source: 0
  # Keep this at the same resolution used for stereo calibration.
  width: 640
  height: 480
  backend: "auto"

stereo:
  enabled: false
  calibration_path: "configs/stereo_calibration.yaml"
  left_camera: 0
  right_camera: 1
  backend: "dshow"

retargeting:
  smoothing_alpha: 0.25
  confidence_threshold: 0.5
  use_neutral_calibration: true

  # Sign/offset corrections are intentionally configurable because Unitree G1
  # joint conventions can differ across model revisions.
  signs:
    left_shoulder_pitch: 1.0
    left_shoulder_roll: -1.0
    left_elbow: -1.0
    right_shoulder_pitch: 1.0
    right_shoulder_roll: -1.0
    right_elbow: -1.0
  scales:
    left_shoulder_pitch: 0.75
    left_shoulder_roll: 1.05
    left_elbow: 1.15
    right_shoulder_pitch: 0.75
    right_shoulder_roll: 1.05
    right_elbow: 1.15
  offsets:
    # Small shoulder offsets make the G1 start with arms lower after human
    # neutral-pose calibration. Tune in 0.05-0.10 rad steps if needed.
    left_shoulder_pitch: -0.05
    left_shoulder_roll: 0.0
    # In the Unitree G1 model, a visually straighter elbow is a positive qpos.
    # Human elbow flexion is then subtracted from this rest value via sign=-1.
    left_elbow: 1.55
    right_shoulder_pitch: -0.25
    right_shoulder_roll: 0.0
    right_elbow: 1.55

joint_limits:
  left_shoulder_pitch: [-2.0, 2.0]
  left_shoulder_roll: [-1.5, 2.1]
  left_elbow: [-1.0, 2.1]
  right_shoulder_pitch: [-2.0, 2.0]
  right_shoulder_roll: [-2.1, 1.5]
  right_elbow: [-1.0, 2.1]

joint_mapping:
  # These are common G1-style joint names. Run
  # python scripts/print_g1_joints.py --model configs/g1_arm_mapping.yaml
  # and adjust this section if your downloaded XML uses different names.
  left_shoulder_pitch: "left_shoulder_pitch_joint"
  left_shoulder_roll: "left_shoulder_roll_joint"
  left_elbow: "left_elbow_joint"
  right_shoulder_pitch: "right_shoulder_pitch_joint"
  right_shoulder_roll: "right_shoulder_roll_joint"
  right_elbow: "right_elbow_joint"
